services:
  postgres:
    image: postgres:16-alpine
    container_name: bitmagnet-postgres
    hostname: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    shm_size: 1g
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-bitmagnet}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./backend/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bitmagnet}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      bitmagnet-net:
        aliases:
          - postgres

  bitmagnet:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BITMAGNET_GIT_TAG: ${BITMAGNET_GIT_TAG:-local}
    container_name: bitmagnet
    hostname: bitmagnet
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3333:3333"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-bitmagnet}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - WEBUI_BASE_URL=${WEBUI_BASE_URL:-http://localhost:3334}
      - MEDIA_CACHE_DIR=/root/.local/share/bitmagnet/cache
    volumes:
      - ./backend/config:/root/.config/bitmagnet
      - ./backend/data:/root/.local/share/bitmagnet
    command:
      - worker
      - run
      - --all
    networks:
      bitmagnet-net:
        aliases:
          - bitmagnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BITMAGNET_INTERNAL_API_BASE_URL: http://bitmagnet:3333
    container_name: bitmagnet-frontend
    hostname: frontend
    restart: unless-stopped
    depends_on:
      bitmagnet:
        condition: service_started
    ports:
      - "3334:3000"
    environment:
      - BITMAGNET_INTERNAL_API_BASE_URL=http://bitmagnet:3333
    networks:
      bitmagnet-net:
        aliases:
          - frontend

networks:
  bitmagnet-net:
    driver: bridge
