services:
  bitmagnet:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BITMAGNET_GIT_TAG: ${BITMAGNET_GIT_TAG:-local}
    container_name: bitmagnet
    hostname: bitmagnet
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-host.docker.internal}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-bitmagnet}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - WEBUI_BASE_URL=${WEBUI_BASE_URL:-http://localhost:3334}
      - MEDIA_CACHE_DIR=/root/.local/share/bitmagnet/cache
    volumes:
      - ./backend/config:/root/.config/bitmagnet
      - ./backend/data:/root/.local/share/bitmagnet
    command:
      - worker
      - run
      - --all
    networks:
      bitmagnet-net:
        aliases:
          - bitmagnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BITMAGNET_INTERNAL_API_BASE_URL: http://bitmagnet:3333
    container_name: bitmagnet-frontend
    hostname: frontend
    restart: unless-stopped
    depends_on:
      bitmagnet:
        condition: service_started
    ports:
      - "3334:3000"
    environment:
      - BITMAGNET_INTERNAL_API_BASE_URL=http://bitmagnet:3333
    networks:
      bitmagnet-net:
        aliases:
          - frontend

networks:
  bitmagnet-net:
    driver: bridge
