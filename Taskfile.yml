version: "3"

tasks:
  gen:
    cmds:
      - cd backend && task gen

  i18n-extract:
    cmds:
      - echo "No standalone i18n extraction step for Next.js frontend"

  lint:
    cmds:
      - cd backend && task lint

  test:
    cmds:
      - cd backend && task test

  migrate:
    cmds:
      - cd backend && task migrate

  build-webui:
    cmds:
      - cd frontend && npm run build

  install-webui:
    cmds:
      - cd frontend && npm install

  serve-webui:
    cmds:
      - cd frontend && npm run dev -- --hostname {{.HOST}} --port {{.PORT}}
    vars:
      HOST: localhost
      PORT: 3334
