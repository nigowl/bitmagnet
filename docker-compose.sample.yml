# 说明：
# 1) 该样例通过 frontend/backend 目录下的 Dockerfile 进行本地构建
# 2) 三个服务都在 bitmagnet-net 虚拟网络内，容器间通过 hostname 互访
# 3) 对外访问请使用主机端口（3333/3334/5432/9091）
services:
  postgres:
    image: postgres:16-alpine
    container_name: bitmagnet-postgres
    hostname: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    shm_size: 1g
    environment:
      - POSTGRES_DB=bitmagnet
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./backend/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bitmagnet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      bitmagnet-net:
        aliases:
          - postgres

  bitmagnet:
    # 基于 backend/Dockerfile 构建后端镜像
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BITMAGNET_GIT_TAG: local
    container_name: bitmagnet
    hostname: bitmagnet
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3333:3333"
    environment:
      # 容器内通过服务 hostname 访问数据库
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=bitmagnet
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      # 运行模式：development / production（用于隔离 bm_key_values 运行时配置）
      - BITMAGNET_RUNTIME_MODE=production
      # 日志配置：等级（DEBUG/INFO/WARNING/ERROR/CRITICAL/ALERT/EMERGENCY）
      - LOG_LEVEL=INFO
      # 日志配置：文件日志等级（建议与 LOG_LEVEL 保持一致）
      - LOG_FILE_ROTATOR_LEVEL=INFO
      # 日志配置：单个日志文件滚动大小（字节，16 MiB = 16777216）
      - LOG_FILE_ROTATOR_MAX_SIZE=16777216
      # 日志配置：保留滚动日志文件数量
      - LOG_FILE_ROTATOR_MAX_BACKUPS=10
      # 媒体封面缓存目录（映射到 ./backend/data）
      - MEDIA_CACHE_DIR=/root/.local/share/bitmagnet/cache
      # 注意：这是返回给浏览器的前端地址（需主机可访问）
      - WEBUI_BASE_URL=http://localhost:3334
    volumes:
      - ./backend/config:/root/.config/bitmagnet
      - ./backend/data:/root/.local/share/bitmagnet
    command:
      - worker
      - run
      - --all
    networks:
      bitmagnet-net:
        aliases:
          - bitmagnet

  frontend:
    # 基于 frontend/Dockerfile 构建前端镜像
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BITMAGNET_INTERNAL_API_BASE_URL: http://bitmagnet:3333
    container_name: bitmagnet-frontend
    hostname: frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      bitmagnet:
        condition: service_started
    ports:
      - "3334:3000"
    environment:
      # 前端服务端转发到后端时使用容器 hostname（见 next.config.ts rewrites）
      - BITMAGNET_INTERNAL_API_BASE_URL=http://bitmagnet:3333
    networks:
      bitmagnet-net:
        aliases:
          - frontend

  transmission:
    image: linuxserver/transmission:latest
    container_name: bitmagnet-transmission
    hostname: transmission
    restart: unless-stopped
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    environment:
      # 请按需替换为宿主机实际时区
      - TZ=Asia/Shanghai
      - PUID=1000
      - PGID=1000
      # Web 管理账号（也用于 RPC 认证）
      - USER=admin
      - PASS=admin
    volumes:
      - ./backend/data/transmission/config:/config
      - ./backend/data/transmission/downloads:/downloads
      - ./backend/data/transmission/watch:/watch
    networks:
      bitmagnet-net:
        aliases:
          - transmission

networks:
  bitmagnet-net:
    # 所有服务共享同一个虚拟网络
    driver: bridge
