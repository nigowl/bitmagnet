services:
  bitmagnet:
    # 基于 backend/Dockerfile 本地构建后端镜像
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BITMAGNET_GIT_TAG: local
    container_name: bitmagnet
    hostname: bitmagnet
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      # 数据库连接：默认指向宿主机 PostgreSQL，可按需在 .env 覆盖
      - POSTGRES_HOST=${POSTGRES_HOST:-192.168.31.201}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-bitmagnet}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-jaQ1BezHeQZ741wvjVRCLbGD4X5xK5lA}
      # 媒体封面缓存目录（映射到 ./backend/data）
      - MEDIA_CACHE_DIR=/root/.local/share/bitmagnet/cache
      # 注意：这是返回给浏览器的前端地址（需主机可访问）
      - WEBUI_BASE_URL=${WEBUI_BASE_URL:-http://localhost:3334}
    volumes:
      - ./backend/config:/root/.config/bitmagnet
      - ./backend/data:/root/.local/share/bitmagnet
    command:
      - worker
      - run
      - --all
    networks:
      bitmagnet-net:
        aliases:
          - bitmagnet

  frontend:
    # 基于 frontend/Dockerfile 本地构建前端镜像
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BITMAGNET_INTERNAL_API_BASE_URL: http://bitmagnet:3333
    container_name: bitmagnet-frontend
    hostname: frontend
    restart: unless-stopped
    depends_on:
      bitmagnet:
        condition: service_started
    ports:
      - "3334:3000"
    environment:
      # 前端服务端转发到后端时使用容器 hostname（见 next.config.ts rewrites）
      - BITMAGNET_INTERNAL_API_BASE_URL=http://bitmagnet:3333
    networks:
      bitmagnet-net:
        aliases:
          - frontend

networks:
  bitmagnet-net:
    # 所有服务共享同一个虚拟网络
    driver: bridge
